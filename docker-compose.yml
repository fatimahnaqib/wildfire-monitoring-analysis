services:
  # -------------------------------
  # Kafka topics init (run once after Kafka is healthy)
  # -------------------------------
  kafka-topics-init:
    build:
      context: .
      dockerfile: ./airflow/Dockerfile
    container_name: kafka_topics_init
    command: ["python", "-m", "etl.kafka_topics"]
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka-1:9092,kafka-2:9092,kafka-3:9092
      KAFKA_SECURITY_PROTOCOL: ${KAFKA_SECURITY_PROTOCOL:-}
      KAFKA_SSL_CA_LOCATION: ${KAFKA_SSL_CA_LOCATION:-}
      KAFKA_SSL_CERTIFICATE_LOCATION: ${KAFKA_SSL_CERTIFICATE_LOCATION:-}
      KAFKA_SSL_KEY_LOCATION: ${KAFKA_SSL_KEY_LOCATION:-}
      KAFKA_SSL_KEY_PASSWORD: ${KAFKA_SSL_KEY_PASSWORD:-}
      KAFKA_SSL_ENDPOINT_IDENTIFICATION_ALGORITHM: ${KAFKA_SSL_ENDPOINT_IDENTIFICATION_ALGORITHM:-}
      KAFKA_SASL_MECHANISMS: ${KAFKA_SASL_MECHANISMS:-}
      KAFKA_SASL_USERNAME: ${KAFKA_SASL_USERNAME:-}
      KAFKA_SASL_PASSWORD: ${KAFKA_SASL_PASSWORD:-}
      KAFKA_TOPIC_REPLICATION_FACTOR: "3"
      KAFKA_EVENT_TOPIC_PARTITIONS: "6"
      KAFKA_COMMAND_TOPIC_PARTITIONS: "3"
      KAFKA_LEGACY_TOPIC_PARTITIONS: "3"
      PYTHONPATH: /opt/airflow
    volumes:
      - ./airflow:/opt/airflow
    depends_on:
      kafka-1:
        condition: service_healthy
      kafka-2:
        condition: service_healthy
      kafka-3:
        condition: service_healthy
    networks:
      - backend
    restart: "no"

  # -------------------------------
  # Ingestion Service (NASA FIRMS fetch)
  # -------------------------------
  ingestion-api:
    build:
      context: .
      dockerfile: ./services/ingestion/Dockerfile
    ports:
      - "127.0.0.1:8000:8000"
    environment:
      - KAFKA_BOOTSTRAP_SERVERS=kafka-1:9092,kafka-2:9092,kafka-3:9092
      - KAFKA_BROKER=kafka-1:9092,kafka-2:9092,kafka-3:9092
      - KAFKA_TOPIC=wildfire_data
      - KAFKA_INGESTION_COMMAND_TOPIC=wildfire.commands.ingest
      - KAFKA_RAW_EVENTS_TOPIC=wildfire.raw.events
      - FIRMS_MAP_KEY=${FIRMS_MAP_KEY}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      # API-only instance: workers consume commands.
      - INGESTION_COMMAND_CONSUMER_ENABLED=false
      - AUTH_ENABLED=true
      - WILDFIRE_API_KEY=${WILDFIRE_API_KEY}
      - KAFKA_SECURITY_PROTOCOL=${KAFKA_SECURITY_PROTOCOL:-}
      - KAFKA_SSL_CA_LOCATION=${KAFKA_SSL_CA_LOCATION:-}
      - KAFKA_SSL_CERTIFICATE_LOCATION=${KAFKA_SSL_CERTIFICATE_LOCATION:-}
      - KAFKA_SSL_KEY_LOCATION=${KAFKA_SSL_KEY_LOCATION:-}
      - KAFKA_SSL_KEY_PASSWORD=${KAFKA_SSL_KEY_PASSWORD:-}
      - KAFKA_SSL_ENDPOINT_IDENTIFICATION_ALGORITHM=${KAFKA_SSL_ENDPOINT_IDENTIFICATION_ALGORITHM:-}
      - KAFKA_SASL_MECHANISMS=${KAFKA_SASL_MECHANISMS:-}
      - KAFKA_SASL_USERNAME=${KAFKA_SASL_USERNAME:-}
      - KAFKA_SASL_PASSWORD=${KAFKA_SASL_PASSWORD:-}
    depends_on:
      kafka-1:
        condition: service_healthy
      kafka-2:
        condition: service_healthy
      kafka-3:
        condition: service_healthy
      postgres:
        condition: service_healthy
      kafka-topics-init:
        condition: service_completed_successfully
    networks:
      - app
      - backend

  # Scalable ingestion workers (Kafka commands -> raw events)
  ingestion-worker:
    build:
      context: .
      dockerfile: ./services/ingestion/Dockerfile
    environment:
      - KAFKA_BOOTSTRAP_SERVERS=kafka-1:9092,kafka-2:9092,kafka-3:9092
      - KAFKA_BROKER=kafka-1:9092,kafka-2:9092,kafka-3:9092
      - KAFKA_TOPIC=wildfire_data
      - KAFKA_INGESTION_COMMAND_TOPIC=wildfire.commands.ingest
      - KAFKA_RAW_EVENTS_TOPIC=wildfire.raw.events
      - KAFKA_DLQ_TOPIC=wildfire.dlq.events
      - FIRMS_MAP_KEY=${FIRMS_MAP_KEY}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - INGESTION_COMMAND_CONSUMER_ENABLED=true
      - KAFKA_SECURITY_PROTOCOL=${KAFKA_SECURITY_PROTOCOL:-}
      - KAFKA_SSL_CA_LOCATION=${KAFKA_SSL_CA_LOCATION:-}
      - KAFKA_SSL_CERTIFICATE_LOCATION=${KAFKA_SSL_CERTIFICATE_LOCATION:-}
      - KAFKA_SSL_KEY_LOCATION=${KAFKA_SSL_KEY_LOCATION:-}
      - KAFKA_SSL_KEY_PASSWORD=${KAFKA_SSL_KEY_PASSWORD:-}
      - KAFKA_SSL_ENDPOINT_IDENTIFICATION_ALGORITHM=${KAFKA_SSL_ENDPOINT_IDENTIFICATION_ALGORITHM:-}
      - KAFKA_SASL_MECHANISMS=${KAFKA_SASL_MECHANISMS:-}
      - KAFKA_SASL_USERNAME=${KAFKA_SASL_USERNAME:-}
      - KAFKA_SASL_PASSWORD=${KAFKA_SASL_PASSWORD:-}
    depends_on:
      kafka-1:
        condition: service_healthy
      kafka-2:
        condition: service_healthy
      kafka-3:
        condition: service_healthy
      postgres:
        condition: service_healthy
      kafka-topics-init:
        condition: service_completed_successfully
    networks:
      - backend

  # -------------------------------
  # Producer Service (HTTP trigger -> Kafka ingestion commands; no shared CSV)
  # -------------------------------
  producer:
    build:
      context: .
      dockerfile: ./services/producer/Dockerfile
    container_name: wildfire_producer
    ports:
      - "127.0.0.1:8001:8001"
    environment:
      - KAFKA_BOOTSTRAP_SERVERS=kafka-1:9092,kafka-2:9092,kafka-3:9092
      - KAFKA_INGESTION_COMMAND_TOPIC=wildfire.commands.ingest
      - FIRMS_MAP_KEY=${FIRMS_MAP_KEY}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - AUTH_ENABLED=true
      - WILDFIRE_API_KEY=${WILDFIRE_API_KEY}
      - KAFKA_SECURITY_PROTOCOL=${KAFKA_SECURITY_PROTOCOL:-}
      - KAFKA_SSL_CA_LOCATION=${KAFKA_SSL_CA_LOCATION:-}
      - KAFKA_SSL_CERTIFICATE_LOCATION=${KAFKA_SSL_CERTIFICATE_LOCATION:-}
      - KAFKA_SSL_KEY_LOCATION=${KAFKA_SSL_KEY_LOCATION:-}
      - KAFKA_SSL_KEY_PASSWORD=${KAFKA_SSL_KEY_PASSWORD:-}
      - KAFKA_SSL_ENDPOINT_IDENTIFICATION_ALGORITHM=${KAFKA_SSL_ENDPOINT_IDENTIFICATION_ALGORITHM:-}
      - KAFKA_SASL_MECHANISMS=${KAFKA_SASL_MECHANISMS:-}
      - KAFKA_SASL_USERNAME=${KAFKA_SASL_USERNAME:-}
      - KAFKA_SASL_PASSWORD=${KAFKA_SASL_PASSWORD:-}
    depends_on:
      kafka-1:
        condition: service_healthy
      kafka-2:
        condition: service_healthy
      kafka-3:
        condition: service_healthy
      postgres:
        condition: service_healthy
      kafka-topics-init:
        condition: service_completed_successfully
    networks:
      - app
      - backend

  # -------------------------------
  # Validation Processor (raw events -> processed events)
  # -------------------------------
  validation-processor:
    build:
      context: .
      dockerfile: ./airflow/Dockerfile
    container_name: wildfire_validation_processor
    command: ["python", "-m", "app.validation_processor"]
    environment:
      PYTHONPATH: /opt/airflow:/opt/consumer
      KAFKA_BROKER: kafka-1:9092,kafka-2:9092,kafka-3:9092
      KAFKA_RAW_EVENTS_TOPIC: wildfire.raw.events
      KAFKA_PROCESSED_EVENTS_TOPIC: wildfire.processed.events
      KAFKA_DLQ_TOPIC: wildfire.dlq.events
      KAFKA_SECURITY_PROTOCOL: ${KAFKA_SECURITY_PROTOCOL:-}
      KAFKA_SSL_CA_LOCATION: ${KAFKA_SSL_CA_LOCATION:-}
      KAFKA_SSL_CERTIFICATE_LOCATION: ${KAFKA_SSL_CERTIFICATE_LOCATION:-}
      KAFKA_SSL_KEY_LOCATION: ${KAFKA_SSL_KEY_LOCATION:-}
      KAFKA_SSL_KEY_PASSWORD: ${KAFKA_SSL_KEY_PASSWORD:-}
      KAFKA_SSL_ENDPOINT_IDENTIFICATION_ALGORITHM: ${KAFKA_SSL_ENDPOINT_IDENTIFICATION_ALGORITHM:-}
      KAFKA_SASL_MECHANISMS: ${KAFKA_SASL_MECHANISMS:-}
      KAFKA_SASL_USERNAME: ${KAFKA_SASL_USERNAME:-}
      KAFKA_SASL_PASSWORD: ${KAFKA_SASL_PASSWORD:-}
    volumes:
      - ./airflow:/opt/airflow
      - ./services/consumer:/opt/consumer
    depends_on:
      kafka-1:
        condition: service_healthy
      kafka-2:
        condition: service_healthy
      kafka-3:
        condition: service_healthy
      kafka-topics-init:
        condition: service_completed_successfully
    restart: unless-stopped
    networks:
      - backend

  # -------------------------------
  # Consumer Service (Kafka consumer with health/metrics)
  # -------------------------------
  consumer:
    build:
      context: .
      dockerfile: ./services/consumer/Dockerfile
    # Scalable worker consumers: do NOT publish a host port, otherwise `--scale consumer=N`
    # will fail due to port collisions. Use `consumer-api` for the single HTTP endpoint.
    environment:
      - KAFKA_BROKER=kafka-1:9092,kafka-2:9092,kafka-3:9092
      - KAFKA_TOPIC=wildfire.processed.events
      - KAFKA_GROUP_ID=wildfire_group
      - KAFKA_DLQ_TOPIC=wildfire.dlq.events
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_DB=wildfire_db
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_SSLMODE=${POSTGRES_SSLMODE:-}
      - POSTGRES_SSL_ROOT_CERT=${POSTGRES_SSL_ROOT_CERT:-}
      - POSTGRES_SSL_CERT=${POSTGRES_SSL_CERT:-}
      - POSTGRES_SSL_KEY=${POSTGRES_SSL_KEY:-}
      - KAFKA_SECURITY_PROTOCOL=${KAFKA_SECURITY_PROTOCOL:-}
      - KAFKA_SSL_CA_LOCATION=${KAFKA_SSL_CA_LOCATION:-}
      - KAFKA_SSL_CERTIFICATE_LOCATION=${KAFKA_SSL_CERTIFICATE_LOCATION:-}
      - KAFKA_SSL_KEY_LOCATION=${KAFKA_SSL_KEY_LOCATION:-}
      - KAFKA_SSL_KEY_PASSWORD=${KAFKA_SSL_KEY_PASSWORD:-}
      - KAFKA_SSL_ENDPOINT_IDENTIFICATION_ALGORITHM=${KAFKA_SSL_ENDPOINT_IDENTIFICATION_ALGORITHM:-}
      - KAFKA_SASL_MECHANISMS=${KAFKA_SASL_MECHANISMS:-}
      - KAFKA_SASL_USERNAME=${KAFKA_SASL_USERNAME:-}
      - KAFKA_SASL_PASSWORD=${KAFKA_SASL_PASSWORD:-}
    depends_on:
      kafka-1:
        condition: service_healthy
      kafka-2:
        condition: service_healthy
      kafka-3:
        condition: service_healthy
      kafka-topics-init:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
    networks:
      - backend

  # Single instance exposing HTTP API for stats/health on localhost:8002
  consumer-api:
    build:
      context: .
      dockerfile: ./services/consumer/Dockerfile
    ports:
      # Host port is configurable: set CONSUMER_API_PORT in `.env` if 8002 is taken.
      - "127.0.0.1:${CONSUMER_API_PORT:-8002}:8002"
    environment:
      - KAFKA_BROKER=kafka-1:9092,kafka-2:9092,kafka-3:9092
      - KAFKA_TOPIC=wildfire.processed.events
      - KAFKA_GROUP_ID=wildfire_group
      - KAFKA_DLQ_TOPIC=wildfire.dlq.events
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_DB=wildfire_db
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - AUTH_ENABLED=true
      - WILDFIRE_API_KEY=${WILDFIRE_API_KEY}
      - POSTGRES_SSLMODE=${POSTGRES_SSLMODE:-}
      - POSTGRES_SSL_ROOT_CERT=${POSTGRES_SSL_ROOT_CERT:-}
      - POSTGRES_SSL_CERT=${POSTGRES_SSL_CERT:-}
      - POSTGRES_SSL_KEY=${POSTGRES_SSL_KEY:-}
      - KAFKA_SECURITY_PROTOCOL=${KAFKA_SECURITY_PROTOCOL:-}
      - KAFKA_SSL_CA_LOCATION=${KAFKA_SSL_CA_LOCATION:-}
      - KAFKA_SSL_CERTIFICATE_LOCATION=${KAFKA_SSL_CERTIFICATE_LOCATION:-}
      - KAFKA_SSL_KEY_LOCATION=${KAFKA_SSL_KEY_LOCATION:-}
      - KAFKA_SSL_KEY_PASSWORD=${KAFKA_SSL_KEY_PASSWORD:-}
      - KAFKA_SSL_ENDPOINT_IDENTIFICATION_ALGORITHM=${KAFKA_SSL_ENDPOINT_IDENTIFICATION_ALGORITHM:-}
      - KAFKA_SASL_MECHANISMS=${KAFKA_SASL_MECHANISMS:-}
      - KAFKA_SASL_USERNAME=${KAFKA_SASL_USERNAME:-}
      - KAFKA_SASL_PASSWORD=${KAFKA_SASL_PASSWORD:-}
    depends_on:
      kafka-1:
        condition: service_healthy
      kafka-2:
        condition: service_healthy
      kafka-3:
        condition: service_healthy
      kafka-topics-init:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
    networks:
      - app
      - backend

  # -------------------------------
  # Map Service (Wildfire visualization)
  # -------------------------------
  map-api:
    build:
      context: .
      dockerfile: ./services/map/Dockerfile
    ports:
      - "127.0.0.1:8003:8003"
    environment:
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_DB=wildfire_db
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - FIRMS_MAP_KEY=${FIRMS_MAP_KEY}
      - AIRFLOW_DASHBOARD_DIR=/dashboard
      - KAFKA_BROKER=kafka-1:9092,kafka-2:9092,kafka-3:9092
      - KAFKA_PROCESSED_EVENTS_TOPIC=wildfire.processed.events
      - KAFKA_MAP_COMMAND_TOPIC=wildfire.commands.map.regenerate
      # API-only instance: workers consume events/commands and regenerate maps.
      - MAP_CONSUMER_ENABLED=false
      # OSM tiles: root-relative /osm-tiles/... proxied with Referer + User-Agent (see services/map main.py)
      - OSM_TILE_USE_PROXY=true
      # Optional: public URL of this map app for OSM fallback Referer when Origin/Referer are missing
      - MAP_PUBLIC_BASE_URL=http://localhost:8003
      - AUTH_ENABLED=true
      - WILDFIRE_API_KEY=${WILDFIRE_API_KEY}
      - POSTGRES_SSLMODE=${POSTGRES_SSLMODE:-}
      - POSTGRES_SSL_ROOT_CERT=${POSTGRES_SSL_ROOT_CERT:-}
      - POSTGRES_SSL_CERT=${POSTGRES_SSL_CERT:-}
      - POSTGRES_SSL_KEY=${POSTGRES_SSL_KEY:-}
      - KAFKA_SECURITY_PROTOCOL=${KAFKA_SECURITY_PROTOCOL:-}
      - KAFKA_SSL_CA_LOCATION=${KAFKA_SSL_CA_LOCATION:-}
      - KAFKA_SSL_CERTIFICATE_LOCATION=${KAFKA_SSL_CERTIFICATE_LOCATION:-}
      - KAFKA_SSL_KEY_LOCATION=${KAFKA_SSL_KEY_LOCATION:-}
      - KAFKA_SSL_KEY_PASSWORD=${KAFKA_SSL_KEY_PASSWORD:-}
      - KAFKA_SSL_ENDPOINT_IDENTIFICATION_ALGORITHM=${KAFKA_SSL_ENDPOINT_IDENTIFICATION_ALGORITHM:-}
      - KAFKA_SASL_MECHANISMS=${KAFKA_SASL_MECHANISMS:-}
      - KAFKA_SASL_USERNAME=${KAFKA_SASL_USERNAME:-}
      - KAFKA_SASL_PASSWORD=${KAFKA_SASL_PASSWORD:-}
    volumes:
      - ./airflow/dashboard:/dashboard
    depends_on:
      postgres:
        condition: service_healthy
      kafka-1:
        condition: service_healthy
      kafka-2:
        condition: service_healthy
      kafka-3:
        condition: service_healthy
      kafka-topics-init:
        condition: service_completed_successfully
    networks:
      - app
      - backend

  # Scalable map workers (processed events / map commands -> regenerate HTML map)
  map-worker:
    build:
      context: .
      dockerfile: ./services/map/Dockerfile
    environment:
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_DB=wildfire_db
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - FIRMS_MAP_KEY=${FIRMS_MAP_KEY}
      - AIRFLOW_DASHBOARD_DIR=/dashboard
      - KAFKA_BROKER=kafka-1:9092,kafka-2:9092,kafka-3:9092
      - KAFKA_PROCESSED_EVENTS_TOPIC=wildfire.processed.events
      - KAFKA_MAP_COMMAND_TOPIC=wildfire.commands.map.regenerate
      - KAFKA_DLQ_TOPIC=wildfire.dlq.events
      - MAP_CONSUMER_ENABLED=true
      - OSM_TILE_USE_PROXY=true
      - MAP_PUBLIC_BASE_URL=http://localhost:8003
      - POSTGRES_SSLMODE=${POSTGRES_SSLMODE:-}
      - POSTGRES_SSL_ROOT_CERT=${POSTGRES_SSL_ROOT_CERT:-}
      - POSTGRES_SSL_CERT=${POSTGRES_SSL_CERT:-}
      - POSTGRES_SSL_KEY=${POSTGRES_SSL_KEY:-}
      - KAFKA_SECURITY_PROTOCOL=${KAFKA_SECURITY_PROTOCOL:-}
      - KAFKA_SSL_CA_LOCATION=${KAFKA_SSL_CA_LOCATION:-}
      - KAFKA_SSL_CERTIFICATE_LOCATION=${KAFKA_SSL_CERTIFICATE_LOCATION:-}
      - KAFKA_SSL_KEY_LOCATION=${KAFKA_SSL_KEY_LOCATION:-}
      - KAFKA_SSL_KEY_PASSWORD=${KAFKA_SSL_KEY_PASSWORD:-}
      - KAFKA_SSL_ENDPOINT_IDENTIFICATION_ALGORITHM=${KAFKA_SSL_ENDPOINT_IDENTIFICATION_ALGORITHM:-}
      - KAFKA_SASL_MECHANISMS=${KAFKA_SASL_MECHANISMS:-}
      - KAFKA_SASL_USERNAME=${KAFKA_SASL_USERNAME:-}
      - KAFKA_SASL_PASSWORD=${KAFKA_SASL_PASSWORD:-}
    volumes:
      - ./airflow/dashboard:/dashboard
    depends_on:
      postgres:
        condition: service_healthy
      kafka-1:
        condition: service_healthy
      kafka-2:
        condition: service_healthy
      kafka-3:
        condition: service_healthy
      kafka-topics-init:
        condition: service_completed_successfully
    networks:
      - backend

  # -------------------------------
  # PostgreSQL for Airflow & Wildfire DB
  # -------------------------------
  postgres:
    image: postgres:14
    container_name: wildfire_postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "127.0.0.1:${POSTGRES_HOST_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$$POSTGRES_USER\" -d postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - backend

  # Scheduled logical backups (gzip SQL). Restore: zcat file.sql.gz | psql ...
  # For HA Postgres, override POSTGRES_HOST to pgpool in docker-compose.ha.yml.
  postgres-backup:
    image: postgres:14
    container_name: wildfire_postgres_backup
    restart: unless-stopped
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_SSLMODE: ${POSTGRES_SSLMODE:-}
      POSTGRES_SSL_ROOT_CERT: ${POSTGRES_SSL_ROOT_CERT:-}
      POSTGRES_BACKUP_DATABASES: wildfire_db airflowdb
      BACKUP_DIR: /backups
      BACKUP_INTERVAL_SEC: "86400"
      BACKUP_RETENTION_DAYS: "14"
    volumes:
      - ./backups/postgres:/backups
      - ./postgres/backup:/backup-scripts:ro
    depends_on:
      postgres:
        condition: service_healthy
    entrypoint: ["/bin/bash", "/backup-scripts/backup_loop.sh"]
    networks:
      - backend

  # Kafka — 3-broker KRaft cluster (RF=3 topics; tolerate broker loss).
  # Uses Confluent's Kafka image because Bitnami no longer publishes pullable tags on Docker Hub.
  kafka-1:
    image: confluentinc/cp-kafka:7.8.0
    hostname: kafka-1
    container_name: wildfire_kafka_1
    ports:
      - "127.0.0.1:9092:9092"
    environment:
      CLUSTER_ID: GbH0TnUuRw-uXmu-MRTKIg
      KAFKA_NODE_ID: 1
      KAFKA_BROKER_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka-1:9093,2@kafka-2:9093,3@kafka-3:9093
      KAFKA_LISTENERS: PLAINTEXT://kafka-1:9092,CONTROLLER://kafka-1:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka-1:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 3
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 3
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 2
      KAFKA_DEFAULT_REPLICATION_FACTOR: 3
      KAFKA_MIN_INSYNC_REPLICAS: 2
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
    volumes:
      - kafka_data_1:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "kafka-broker-api-versions --bootstrap-server kafka-1:9092 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 8
      start_period: 60s
    networks:
      - backend

  kafka-2:
    image: confluentinc/cp-kafka:7.8.0
    hostname: kafka-2
    container_name: wildfire_kafka_2
    ports:
      - "127.0.0.1:9094:9092"
    environment:
      CLUSTER_ID: GbH0TnUuRw-uXmu-MRTKIg
      KAFKA_NODE_ID: 2
      KAFKA_BROKER_ID: 2
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka-1:9093,2@kafka-2:9093,3@kafka-3:9093
      KAFKA_LISTENERS: PLAINTEXT://kafka-2:9092,CONTROLLER://kafka-2:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka-2:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 3
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 3
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 2
      KAFKA_DEFAULT_REPLICATION_FACTOR: 3
      KAFKA_MIN_INSYNC_REPLICAS: 2
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
    volumes:
      - kafka_data_2:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "kafka-broker-api-versions --bootstrap-server kafka-2:9092 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 8
      start_period: 60s
    networks:
      - backend

  kafka-3:
    image: confluentinc/cp-kafka:7.8.0
    hostname: kafka-3
    container_name: wildfire_kafka_3
    ports:
      - "127.0.0.1:9095:9092"
    environment:
      CLUSTER_ID: GbH0TnUuRw-uXmu-MRTKIg
      KAFKA_NODE_ID: 3
      KAFKA_BROKER_ID: 3
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka-1:9093,2@kafka-2:9093,3@kafka-3:9093
      KAFKA_LISTENERS: PLAINTEXT://kafka-3:9092,CONTROLLER://kafka-3:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka-3:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 3
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 3
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 2
      KAFKA_DEFAULT_REPLICATION_FACTOR: 3
      KAFKA_MIN_INSYNC_REPLICAS: 2
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
    volumes:
      - kafka_data_3:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "kafka-broker-api-versions --bootstrap-server kafka-3:9092 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 8
      start_period: 60s
    networks:
      - backend

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: wildfire_kafka_ui
    ports:
      - "127.0.0.1:8081:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: wildfire
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka-1:9092,kafka-2:9092,kafka-3:9092
      DYNAMIC_CONFIG_ENABLED: "true"
    depends_on:
      kafka-1:
        condition: service_healthy
      kafka-2:
        condition: service_healthy
      kafka-3:
        condition: service_healthy
    networks:
      - app
      - backend

  # Standalone Kafka consumer (creates topic if needed)
  kafka_consumer:
    build:
      context: .
      dockerfile: ./kafka_consumer/Dockerfile
    container_name: wildfire_kafka_consumer
    environment:
      KAFKA_BROKER: kafka-1:9092,kafka-2:9092,kafka-3:9092
      KAFKA_DLQ_TOPIC: wildfire.dlq.events
      KAFKA_TOPIC_REPLICATION_FACTOR: "3"
      KAFKA_LEGACY_TOPIC_PARTITIONS: "3"
      KAFKA_SECURITY_PROTOCOL: ${KAFKA_SECURITY_PROTOCOL:-}
      KAFKA_SSL_CA_LOCATION: ${KAFKA_SSL_CA_LOCATION:-}
      KAFKA_SSL_CERTIFICATE_LOCATION: ${KAFKA_SSL_CERTIFICATE_LOCATION:-}
      KAFKA_SSL_KEY_LOCATION: ${KAFKA_SSL_KEY_LOCATION:-}
      KAFKA_SSL_KEY_PASSWORD: ${KAFKA_SSL_KEY_PASSWORD:-}
      KAFKA_SSL_ENDPOINT_IDENTIFICATION_ALGORITHM: ${KAFKA_SSL_ENDPOINT_IDENTIFICATION_ALGORITHM:-}
      KAFKA_SASL_MECHANISMS: ${KAFKA_SASL_MECHANISMS:-}
      KAFKA_SASL_USERNAME: ${KAFKA_SASL_USERNAME:-}
      KAFKA_SASL_PASSWORD: ${KAFKA_SASL_PASSWORD:-}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      POSTGRES_DB: wildfire_db
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_SSLMODE: ${POSTGRES_SSLMODE:-}
      POSTGRES_SSL_ROOT_CERT: ${POSTGRES_SSL_ROOT_CERT:-}
      POSTGRES_SSL_CERT: ${POSTGRES_SSL_CERT:-}
      POSTGRES_SSL_KEY: ${POSTGRES_SSL_KEY:-}
    depends_on:
      kafka-1:
        condition: service_healthy
      kafka-2:
        condition: service_healthy
      kafka-3:
        condition: service_healthy
      kafka-topics-init:
        condition: service_completed_successfully
      postgres:
        condition: service_started
    restart: always
    networks:
      - backend

  # -------------------------------
  # Apache Airflow Webserver
  # -------------------------------
  # Shared Airflow environment variables
  x-airflow-common: &airflow-common
    build:
      context: .
      dockerfile: ./airflow/Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
      kafka-topics-init:
        condition: service_completed_successfully
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__CORE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${AIRFLOW_DB:-airflowdb}${AIRFLOW_SQLALCHEMY_CONN_SUFFIX:-}
      AIRFLOW__WEBSERVER__EXPOSE_CONFIG: "False"
      PYTHONPATH: /opt/airflow
      KAFKA_BOOTSTRAP_SERVERS: kafka-1:9092,kafka-2:9092,kafka-3:9092
      KAFKA_SECURITY_PROTOCOL: ${KAFKA_SECURITY_PROTOCOL:-}
      KAFKA_SSL_CA_LOCATION: ${KAFKA_SSL_CA_LOCATION:-}
      KAFKA_SSL_CERTIFICATE_LOCATION: ${KAFKA_SSL_CERTIFICATE_LOCATION:-}
      KAFKA_SSL_KEY_LOCATION: ${KAFKA_SSL_KEY_LOCATION:-}
      KAFKA_SSL_KEY_PASSWORD: ${KAFKA_SSL_KEY_PASSWORD:-}
      KAFKA_SSL_ENDPOINT_IDENTIFICATION_ALGORITHM: ${KAFKA_SSL_ENDPOINT_IDENTIFICATION_ALGORITHM:-}
      KAFKA_SASL_MECHANISMS: ${KAFKA_SASL_MECHANISMS:-}
      KAFKA_SASL_USERNAME: ${KAFKA_SASL_USERNAME:-}
      KAFKA_SASL_PASSWORD: ${KAFKA_SASL_PASSWORD:-}
      FIRMS_MAP_KEY: ${FIRMS_MAP_KEY}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      POSTGRES_DB: wildfire_db
      POSTGRES_SSLMODE: ${POSTGRES_SSLMODE:-}
      POSTGRES_SSL_ROOT_CERT: ${POSTGRES_SSL_ROOT_CERT:-}
      POSTGRES_SSL_CERT: ${POSTGRES_SSL_CERT:-}
      POSTGRES_SSL_KEY: ${POSTGRES_SSL_KEY:-}
    volumes:
      - ./airflow:/opt/airflow
      - ./airflow/requirements.txt:/requirements.txt
    networks:
      - app
      - backend

  airflow-webserver:
    <<: *airflow-common
    container_name: airflow_webserver
    command: webserver
    ports:
      - "127.0.0.1:8080:8080"
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:8080/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5

  airflow-scheduler:
    <<: *airflow-common
    container_name: airflow_scheduler
    command: scheduler
    depends_on:
      airflow-webserver:
        condition: service_healthy

  # Second scheduler for redundancy (safe with LocalExecutor; only one will actively schedule).
  airflow-scheduler-2:
    <<: *airflow-common
    command: scheduler
    depends_on:
      airflow-webserver:
        condition: service_healthy

  # Triggerer supports deferrable operators and improves robustness in newer Airflow.
  airflow-triggerer:
    <<: *airflow-common
    command: triggerer
    depends_on:
      airflow-webserver:
        condition: service_healthy

  airflow-init:
    <<: *airflow-common
    entrypoint: /bin/bash
    command: -c "airflow db init && airflow users create --username ${AIRFLOW_ADMIN_USERNAME} --firstname admin --lastname admin --role Admin --email ${AIRFLOW_ADMIN_EMAIL} --password ${AIRFLOW_ADMIN_PASSWORD}"

volumes:
  postgres_data:
  kafka_data_1:
  kafka_data_2:
  kafka_data_3:

networks:
  app: {}
  backend:
    internal: true
