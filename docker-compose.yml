services:
  # -------------------------------
  # Kafka topics init (run once after Kafka is healthy)
  # -------------------------------
  kafka-topics-init:
    build:
      context: .
      dockerfile: ./airflow/Dockerfile
    container_name: kafka_topics_init
    command: ["python", "/opt/airflow/scripts/ensure_kafka_topics.py"]
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka-1:9092,kafka-2:9092,kafka-3:9092
      KAFKA_TOPIC_REPLICATION_FACTOR: "3"
      KAFKA_EVENT_TOPIC_PARTITIONS: "6"
      KAFKA_COMMAND_TOPIC_PARTITIONS: "3"
      KAFKA_LEGACY_TOPIC_PARTITIONS: "3"
      PYTHONPATH: /opt/airflow
    volumes:
      - ./airflow:/opt/airflow
    depends_on:
      kafka-1:
        condition: service_healthy
      kafka-2:
        condition: service_healthy
      kafka-3:
        condition: service_healthy
    restart: "no"

  # -------------------------------
  # Ingestion Service (NASA FIRMS fetch)
  # -------------------------------
  ingestion:
    build:
      context: .
      dockerfile: ./services/ingestion/Dockerfile
    container_name: wildfire_ingestion
    ports:
      - "8000:8000"
    environment:
      - KAFKA_BOOTSTRAP_SERVERS=kafka-1:9092,kafka-2:9092,kafka-3:9092
      - KAFKA_BROKER=kafka-1:9092,kafka-2:9092,kafka-3:9092
      - KAFKA_TOPIC=wildfire_data
      - KAFKA_INGESTION_COMMAND_TOPIC=wildfire.commands.ingest
      - KAFKA_RAW_EVENTS_TOPIC=wildfire.raw.events
    depends_on:
      kafka-1:
        condition: service_healthy
      kafka-2:
        condition: service_healthy
      kafka-3:
        condition: service_healthy
      postgres:
        condition: service_healthy
      kafka-topics-init:
        condition: service_completed_successfully

  # -------------------------------
  # Producer Service (HTTP trigger -> Kafka ingestion commands; no shared CSV)
  # -------------------------------
  producer:
    build:
      context: .
      dockerfile: ./services/producer/Dockerfile
    container_name: wildfire_producer
    ports:
      - "8001:8001"
    environment:
      - KAFKA_BOOTSTRAP_SERVERS=kafka-1:9092,kafka-2:9092,kafka-3:9092
      - KAFKA_INGESTION_COMMAND_TOPIC=wildfire.commands.ingest
    depends_on:
      kafka-1:
        condition: service_healthy
      kafka-2:
        condition: service_healthy
      kafka-3:
        condition: service_healthy
      postgres:
        condition: service_healthy
      kafka-topics-init:
        condition: service_completed_successfully

  # -------------------------------
  # Validation Processor (raw events -> processed events)
  # -------------------------------
  validation-processor:
    build:
      context: .
      dockerfile: ./airflow/Dockerfile
    container_name: wildfire_validation_processor
    command: ["python", "-m", "app.validation_processor"]
    environment:
      PYTHONPATH: /opt/airflow:/opt/consumer
      KAFKA_BROKER: kafka-1:9092,kafka-2:9092,kafka-3:9092
      KAFKA_RAW_EVENTS_TOPIC: wildfire.raw.events
      KAFKA_PROCESSED_EVENTS_TOPIC: wildfire.processed.events
    volumes:
      - ./airflow:/opt/airflow
      - ./services/consumer:/opt/consumer
    depends_on:
      kafka-1:
        condition: service_healthy
      kafka-2:
        condition: service_healthy
      kafka-3:
        condition: service_healthy
      kafka-topics-init:
        condition: service_completed_successfully
    restart: unless-stopped

  # -------------------------------
  # Consumer Service (Kafka consumer with health/metrics)
  # -------------------------------
  consumer:
    build:
      context: .
      dockerfile: ./services/consumer/Dockerfile
    # Scalable worker consumers: do NOT publish a host port, otherwise `--scale consumer=N`
    # will fail due to port collisions. Use `consumer-api` for the single HTTP endpoint.
    environment:
      - KAFKA_BROKER=kafka-1:9092,kafka-2:9092,kafka-3:9092
      - KAFKA_TOPIC=wildfire.processed.events
      - KAFKA_GROUP_ID=wildfire_group
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_DB=wildfire_db
      - POSTGRES_USER=airflow
      - POSTGRES_PASSWORD=airflow
    depends_on:
      kafka-1:
        condition: service_healthy
      kafka-2:
        condition: service_healthy
      kafka-3:
        condition: service_healthy
      kafka-topics-init:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy

  # Single instance exposing HTTP API for stats/health on localhost:8002
  consumer-api:
    build:
      context: .
      dockerfile: ./services/consumer/Dockerfile
    ports:
      # Host port is configurable: set CONSUMER_API_PORT in `.env` if 8002 is taken.
      - "${CONSUMER_API_PORT:-8002}:8002"
    environment:
      - KAFKA_BROKER=kafka-1:9092,kafka-2:9092,kafka-3:9092
      - KAFKA_TOPIC=wildfire.processed.events
      - KAFKA_GROUP_ID=wildfire_group
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_DB=wildfire_db
      - POSTGRES_USER=airflow
      - POSTGRES_PASSWORD=airflow
    depends_on:
      kafka-1:
        condition: service_healthy
      kafka-2:
        condition: service_healthy
      kafka-3:
        condition: service_healthy
      kafka-topics-init:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy

  # -------------------------------
  # Map Service (Wildfire visualization)
  # -------------------------------
  map:
    build:
      context: .
      dockerfile: ./services/map/Dockerfile
    container_name: wildfire_map
    ports:
      - "8003:8003"
    environment:
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_DB=wildfire_db
      - POSTGRES_USER=airflow
      - POSTGRES_PASSWORD=airflow
      - AIRFLOW_DASHBOARD_DIR=/dashboard
      - KAFKA_BROKER=kafka-1:9092,kafka-2:9092,kafka-3:9092
      - KAFKA_PROCESSED_EVENTS_TOPIC=wildfire.processed.events
      - KAFKA_MAP_COMMAND_TOPIC=wildfire.commands.map.regenerate
      # OSM tiles: root-relative /osm-tiles/... proxied with Referer + User-Agent (see services/map main.py)
      - OSM_TILE_USE_PROXY=true
      # Optional: public URL of this map app for OSM fallback Referer when Origin/Referer are missing
      - MAP_PUBLIC_BASE_URL=http://localhost:8003
    volumes:
      - ./airflow/dashboard:/dashboard
    depends_on:
      postgres:
        condition: service_healthy
      kafka-1:
        condition: service_healthy
      kafka-2:
        condition: service_healthy
      kafka-3:
        condition: service_healthy
      kafka-topics-init:
        condition: service_completed_successfully

  # -------------------------------
  # PostgreSQL for Airflow & Wildfire DB
  # -------------------------------
  postgres:
    image: postgres:14
    container_name: wildfire_postgres
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U airflow"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Kafka — 3-broker KRaft cluster (RF=3 topics; tolerate broker loss).
  # Uses Confluent's Kafka image because Bitnami no longer publishes pullable tags on Docker Hub.
  kafka-1:
    image: confluentinc/cp-kafka:7.8.0
    hostname: kafka-1
    container_name: wildfire_kafka_1
    ports:
      - "9092:9092"
    environment:
      CLUSTER_ID: GbH0TnUuRw-uXmu-MRTKIg
      KAFKA_NODE_ID: 1
      KAFKA_BROKER_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka-1:9093,2@kafka-2:9093,3@kafka-3:9093
      KAFKA_LISTENERS: PLAINTEXT://kafka-1:9092,CONTROLLER://kafka-1:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka-1:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 3
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 3
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 2
      KAFKA_DEFAULT_REPLICATION_FACTOR: 3
      KAFKA_MIN_INSYNC_REPLICAS: 2
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
    volumes:
      - kafka_data_1:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "kafka-broker-api-versions --bootstrap-server kafka-1:9092 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 8
      start_period: 60s

  kafka-2:
    image: confluentinc/cp-kafka:7.8.0
    hostname: kafka-2
    container_name: wildfire_kafka_2
    ports:
      - "9094:9092"
    environment:
      CLUSTER_ID: GbH0TnUuRw-uXmu-MRTKIg
      KAFKA_NODE_ID: 2
      KAFKA_BROKER_ID: 2
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka-1:9093,2@kafka-2:9093,3@kafka-3:9093
      KAFKA_LISTENERS: PLAINTEXT://kafka-2:9092,CONTROLLER://kafka-2:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka-2:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 3
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 3
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 2
      KAFKA_DEFAULT_REPLICATION_FACTOR: 3
      KAFKA_MIN_INSYNC_REPLICAS: 2
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
    volumes:
      - kafka_data_2:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "kafka-broker-api-versions --bootstrap-server kafka-2:9092 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 8
      start_period: 60s

  kafka-3:
    image: confluentinc/cp-kafka:7.8.0
    hostname: kafka-3
    container_name: wildfire_kafka_3
    ports:
      - "9095:9092"
    environment:
      CLUSTER_ID: GbH0TnUuRw-uXmu-MRTKIg
      KAFKA_NODE_ID: 3
      KAFKA_BROKER_ID: 3
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka-1:9093,2@kafka-2:9093,3@kafka-3:9093
      KAFKA_LISTENERS: PLAINTEXT://kafka-3:9092,CONTROLLER://kafka-3:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka-3:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 3
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 3
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 2
      KAFKA_DEFAULT_REPLICATION_FACTOR: 3
      KAFKA_MIN_INSYNC_REPLICAS: 2
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
    volumes:
      - kafka_data_3:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "kafka-broker-api-versions --bootstrap-server kafka-3:9092 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 8
      start_period: 60s

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: wildfire_kafka_ui
    ports:
      - "8081:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: wildfire
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka-1:9092,kafka-2:9092,kafka-3:9092
      DYNAMIC_CONFIG_ENABLED: "true"
    depends_on:
      kafka-1:
        condition: service_healthy
      kafka-2:
        condition: service_healthy
      kafka-3:
        condition: service_healthy

  # Standalone Kafka consumer (creates topic if needed)
  kafka_consumer:
    build: ./kafka_consumer
    container_name: wildfire_kafka_consumer
    environment:
      KAFKA_BROKER: kafka-1:9092,kafka-2:9092,kafka-3:9092
      KAFKA_TOPIC_REPLICATION_FACTOR: "3"
      KAFKA_LEGACY_TOPIC_PARTITIONS: "3"
    depends_on:
      kafka-1:
        condition: service_healthy
      kafka-2:
        condition: service_healthy
      kafka-3:
        condition: service_healthy
      kafka-topics-init:
        condition: service_completed_successfully
      postgres:
        condition: service_started
    restart: always

  # -------------------------------
  # Apache Airflow Webserver
  # -------------------------------
  # Shared Airflow environment variables
  x-airflow-common: &airflow-common
    build:
      context: .
      dockerfile: ./airflow/Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
      kafka-topics-init:
        condition: service_completed_successfully
    environment:
      AIRFLOW__CORE__EXECUTOR: SequentialExecutor
      AIRFLOW__CORE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres:5432/airflowdb
      AIRFLOW__WEBSERVER__EXPOSE_CONFIG: True
      PYTHONPATH: /opt/airflow
      KAFKA_BOOTSTRAP_SERVERS: kafka-1:9092,kafka-2:9092,kafka-3:9092
    volumes:
      - ./airflow:/opt/airflow
      - ./airflow/requirements.txt:/requirements.txt

  airflow-webserver:
    <<: *airflow-common
    container_name: airflow_webserver
    command: webserver
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:8080/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5

  airflow-scheduler:
    <<: *airflow-common
    container_name: airflow_scheduler
    command: scheduler
    depends_on:
      airflow-webserver:
        condition: service_healthy

  airflow-init:
    <<: *airflow-common
    entrypoint: /bin/bash
    command: -c "airflow db init && airflow users create --username admin --firstname admin --lastname admin --role Admin --email admin@example.com --password admin"

volumes:
  postgres_data:
  kafka_data_1:
  kafka_data_2:
  kafka_data_3:
